services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
    volumes:
      - app-data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "6546:6546"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  app-data:
